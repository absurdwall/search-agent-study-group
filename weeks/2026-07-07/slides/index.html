<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="data:,">
  <title>Agent Study Group 01 - Reset</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0f10;
      --panel: #151819;
      --ink: #f3efe6;
      --muted: #a7aaa7;
      --line: rgba(243, 239, 230, 0.18);
      --accent: #22b8a0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        var(--bg);
      background-size: 42px 42px;
      color: var(--ink);
      letter-spacing: 0;
    }

    main {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .frame {
      width: min(calc(100vw - 56px), calc((100vh - 56px) * 16 / 9));
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 24% 28%, rgba(34, 184, 160, 0.12), transparent 30%),
        var(--panel);
      display: grid;
      align-content: center;
      gap: 24px;
      padding: 64px;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.38);
    }

    .kicker {
      color: var(--accent);
      font-size: 14px;
      font-weight: 820;
      text-transform: uppercase;
    }

    h1 {
      max-width: 900px;
      margin: 0;
      font-size: clamp(48px, 6.4vw, 88px);
      line-height: 1.02;
      letter-spacing: 0;
    }

    p {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 22px;
      line-height: 1.35;
    }

    code {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.07);
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <main>
    <section class="frame" aria-label="Reset slide deck">
      <div class="kicker">Agent Study Group 01 / reset</div>
      <h1>Blank starting point</h1>
      <p>
        The rejected prototypes have been cleared from the active deck. We will rebuild the
        presentation from scratch here, starting with story and purpose before visuals.
      </p>
      <p><code>slides/index.html</code> is intentionally minimal now.</p>
    </section>
  </main>
</body>
</html>
