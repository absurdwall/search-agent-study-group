<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Study Group - 2026-07-07</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        color-scheme: dark;
        --text: #f4f0e8;
        --muted: #aab4bd;
        --accent: #70d6c5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        background:
          radial-gradient(circle at 22% 18%, rgb(112 214 197 / 0.16), transparent 26rem),
          linear-gradient(135deg, #101214, #17191b 45%, #101417);
        color: var(--text);
      }

      main {
        width: min(54rem, 100%);
        display: grid;
        gap: 1.25rem;
      }

      .kicker {
        color: var(--accent);
        font-weight: 800;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.5rem, 9vw, 7rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1.1rem, 2vw, 1.45rem);
        line-height: 1.45;
      }

      a {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="kicker">Agent Study Group</div>
      <h1>2026-07-07 deck coming soon</h1>
      <p>

        placeholder after the material and slide brief are ready.
